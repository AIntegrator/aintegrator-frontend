<section
    class="w-full bg-cta/[0.03] min-h-[84px] flex flex-col justify-center items-center px-6 md:px-[80px] py-4 section-spacing">
    <ng-container *ngIf="highlightText || bodyText; else promoLink">
        <p class="font-sans text-base md:text-xl leading-normal tracking-normal max-w-[330px] md:max-w-none">
            <span class="text-brand-red font-medium">{{ highlightText | localizedText }}</span>
            <span class="text-ai-gray-850 font-normal"> {{ bodyText | localizedText }}</span>
        </p>
    </ng-container>
    <ng-template #promoLink>
        <a href="https://aintegrator.notion.site/314a7ccd21c380549a39dec535c388a4" target="_blank"
            rel="noopener noreferrer" class="font-sans text-base md:text-xl max-w-[330px] md:max-w-none text-center">
            <span class="font-normal text-[#D32F2F]">Gratis-Probeabo – keine Kreditkarte erforderlich.</span>
        </a>
    </ng-template>
</section>
