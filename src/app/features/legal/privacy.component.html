<div class="site-container pt-[96px] pb-[96px] md:pt-[148px] md:pb-[148px] xl:pt-[196px] xl:pb-[196px]">
    <div class="flex flex-col items-start gap-[48px] md:gap-[96px] w-full self-stretch">
        @if (isLoaded()) {
            @if (page()) {
                <h1
                    class="text-ai-gray-1000 font-['Poppins'] text-[32px] md:text-[48px] xl:text-[64px] font-medium text-center m-0 w-full max-w-[1143px] mx-auto">
                    {{ title() || 'Datenschutz' }}
                </h1>

                @if (lastUpdatedFormatted()) {
                    <p class="text-ai-gray-850 font-sans text-sm md:text-base m-0 w-full text-center">
                        {{ lastUpdatedFormatted() }}
                    </p>
                }

                @if (contentHtml(); as html) {
                    <div
                        class="legal-content text-ai-gray-850 font-sans font-normal text-[16px] md:text-[20px] xl:text-[24px] leading-[1.5] w-full self-stretch"
                        [innerHTML]="html">
                    </div>
                }
            } @else {
                <p class="text-ai-gray-850 font-sans text-base m-0">No privacy policy content available.</p>
            }
        } @else {
            <p class="text-ai-gray-850 font-sans text-base m-0">Loading...</p>
        }
    </div>
</div>
